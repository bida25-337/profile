<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">

      <title>Coach - Luxury Goods</title>
      <style>
         * { margin: 0; padding: 0;box-sizing: border-box; font-family: Arial, sans-serif; }
         :root {
            --warmfog: #EAE5DF;
            --berrygood: #A63446;
            --blossom: #E8D8E3;
            --meadowmauve: #B8A3B2;
            --soldiergreen: #4A5248;
         }
         html{
            scroll-behaviour:smooth;
         }
         body{background:var(--warmfog);color:var(--soldiergreen);}
         nav{
            position:fixed;
            width:100%;
            top:0;
            background:rgba(255,255,255,0.9);
            padding:1.2rem 5%;
            display:flex;
            justify-content:space-between;
            align-items: center;
            Z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1)
         }
         .logo { font-size: 1.8rem; font-weight: bold; color: var(--soldiergreen); text-transform: uppercase; }
         .nav-links a {
            text-decoration: none;
            color: var(--soldiergreen);
            margin-left: 1.5rem;
            font-size: 1rem;
            transition:0.3s;
         }
         .nav-links a:hover { color: var(--berrygood);}
         .hero {
            height: 100vh;
            display: flex;
            align-items:center;
            padding: 05%;
            background:url
            background-size:cover;
            background-position: center;
            background-repeat:no-repeat;
            position:relative;
         }
         .hero::before{
            content:";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(234,229,223,0.5);
         }
         .hero-text{
            flex:1;
            position:relative;
            z-index:2;
         }
         .hero-text h1 {
            font-size: 1.2rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #333;
         }
         .btn {
            background: var(--berrygood);
            color:white;
            padding: 0.9rem 2.5rem;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            display:inline-block;
         }
         .btn:hover { background: var(--soldiergreen);}
         .section {
            padding: 6rem 5%;
            scrool-margin-top: 80px;
         }
         .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: var(--soldiergreen);
         }
         .products{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
            gap: 2rem;
         }
         .products-card{
            background: white;
            padding:1.5rem;
            border-radius: 10px;
            text-align: center:
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
         }
         .product-img{
            height: 300px;
            margin-bottom: 1rem;
            border-radius: 8px;
            overflow: hidden;
            background: var(--blossom);
         }
         .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
         }
         .product-card h3 {
            margin-bottom:0.5rem;
            color:var(--soldiergreen);
         }
         .product-card p {
            color: var(--berrygood);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
