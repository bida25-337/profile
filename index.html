         .hero { background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), var(--mead0wmauve); padding: 8rem 2rem; text-align: center; color: white: }

         footer { background: var(--soldoergreen); color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
