<!DOCTYPE html>
 <html lang="en">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Coach</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
     <style>
         :root {
             --cream: #F8F5F2;
             --deep-brown: #5C4B4B;
             --accent: #A63446;
         }
         body {
             background-color: var(--cream);
             color: var(--deep-brown);
             font-family: 'Inter', sans-serif;
             overflow: hidden; 
         }
         .brand-name {
             font-family: 'Playfair Display', serif;
             font-size: clamp(6rem, 18vw, 14rem);
             font-weight: 400;
             line-height: 0.85;
             color: var(--deep-brown);
             text-transform: lowercase;
             position: absolute;
             bottom: -5%;
             left: 0;
             width: 100%;
             text-align: center;
         }
         .nav-link {
             position: relative;
             padding-bottom: 4px;
             text-transform: lowercase;
         }
         .nav-link::after {
             content: '';
             position: absolute;
             bottom: 0;
             left: 0;
             width: 0;
             height: 1px;
             background: var(--accent);
             transition: width 0.3s ease;
         }
         .nav-link:hover::after,
         .nav-link.active::after {
             width: 100%;
         }
     </style>
 </head>
 <body class="h-screen w-screen relative">
     <nav class="fixed w-full top-0 left-0 px-8 py-6 flex justify-end items-center z-50">
         <div class="flex gap-8">
             <a href="index.html" class="nav-link active text-lg">Home</a>
             <a href="bags.html" class="nav-link text-lg">Bags</a>
             <a href="accessories.html" class="nav-link text-lg">Accessories</a>
             <a href="wear.html" class="nav-link text-lg">Wear</a>
             <a href="about.html" class="nav-link text-lg">About Us</a>
             <a href="feedback.html" class="nav-link text-lg">Feedback</a>
         </div>
     </nav>
     <main class="h-full w-full flex items-center justify-center">
     </main>
     <div class="brand-name">
         coach
     </div>
 </body>
 </html>
