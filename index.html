<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Coach - Luxury Goods</title>
      <style>
         * { margin: 0; padding: 0;box-sizing: border-box; font-family: Arial, sans-serif; }
         :root {
            --warmfog: #EAE5DF;
            --berrygood: #A63446;
            --blossom: #E8D8E3;
            --meadowmauve: #B8A3B2;
            --soldiergreen: #4A5248;
         }
         html{
            scroll-behaviour:smooth;
         }
         body{background:var(--warmfog);color:var(--soldiergreen);}
         nav{
            position:fixed;
            width:100%;
            top:0;
            background:rgba(255,255,255,0.9);
            padding:1.2rem 5%;
            display:flex;
            justify-content:space-between;
            align-items: center;
            Z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1)
         }
         .logo { font-size: 1.8rem; font-weight: bold; color: var(--soldiergreen); text-transform: uppercase; }
         .nav-links a {
            text-decoration: none;
            color: var(--soldiergreen);
            margin-left: 1.5rem;
            font-size: 1rem;
            transition:0.3s;
         }
         .nav-links a:hover { color: var(--berrygood);}
         .hero {
            height: 100vh;
            display: flex;
            align-items:center;
            padding: 05%;
            background:![image alt]()
            background-size:cover;
            background-position: center;
            background-repeat:no-repeat;
            position:relative;
         }
         .hero::before{
            content:";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(234,229,223,0.5);
         }
         .hero-text{
            flex:1;
            position:relative;
            z-index:2;
         }
         .hero-text h1 {
            font-size: 1.2rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #333;
         }
         .btn {
            background: var(--berrygood);
            color:white;
            padding: 0.9rem 2.5rem;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            display:inline-block;
         }
         .btn:hover { background: var(--soldiergreen);}
         .section {
            padding: 6rem 5%;
            scrool-margin-top: 80px;
         }
         .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: var(--soldiergreen);
         }
         .products{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
            gap: 2rem;
         }
         .products-card{
            background: white;
            padding:1.5rem;
            border-radius: 10px;
            text-align: center:
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
         }
         .product-img{
            height: 300px;
            margin-bottom: 1rem;
            border-radius: 8px;
            overflow: hidden;
            background: var(--blossom);
         }
         .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
         }
         .product-card h3 {
            margin-bottom:0.5rem;
            color:var(--soldiergreen);
         }
         .product-card p {
            color: var(--berrygood);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
         }
         #about {
            background: white;
         }
         .about-text{
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 1.1rem;
         }
         footer{
            background: var(--soldiergreen);
            color: white;
            text-align:center;
            padding:2rem;
         }
   </style>
   </head>
   <body>
      <nav>
         <div class="logo">COACH</div>
         <div class="nav-links">
          <a href="#home">Home</a>
          <a href="#bags">Bags</a>
          <a href="#accessories">Accessories</a>
          <a href="#wear">Wear</a>
          <a href="#about">About Us</a>
         </div>
      </nav>
      <section class="hero" id="home">
         <div class="hero-text">
            <h1>Timeless elegance<br>& Style</h1>
            <p>Discover our new collection of luxury bags and accessories</p>
            <a href="#bags" class="btn">Shop Now</a>
         </div>
      </section>
      <section class="section" id="bags">
         <h2 class="section-title">Our Bags Collection</h2>
         <div class="products">
            <div class="product-card">
               <div class="product-img">
                  <img src="bag1.jpg" alt="bag">
               </div>
               <h3>Baby blue Jonie Bag</h3>
               <p>P5,345</p>
               <a href="#" class="btn">Add to Cart</a>
            </div>
            <div class="Product-card">
               <div class="product-image">
                  <img src="bag2.jpg" alt="bag">
               </div>
               <h3>City Tote Bag</h3>
               <p>3,453</p>
               <a href="#" class="btn">Add to Cart</a>
            </div>
            <div class="product-card">
               <div class="Product-imgae">
                  <img src="bag3.jpg" alt="Bag">
               </div>
               <h3>Tabby shoulder Bag</h3>
               <p>6,765</p>
               <a href="#" class="btn">Add to Cart</a>
            </div>
         </div>
               
               
   
            
            
            
            
               
                     
               
            
            
            
               
   </body>
