<!DOCTYPE html>
 <html lang="en">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Coach - Feedback</title>
     <style>
         * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
         :root {
             --warmfog: #EAE5DF;
             --berrygood: #A63446;
             --soldiergreen: #4A5248;
         }
         body { background: var(--warmfog); }
         nav { position: fixed; width: 100%; top: 0; background: rgba(255,255,255,0.9); padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
         .logo { font-size: 1.8rem; font-weight: bold; color: var(--soldiergreen); }
         .nav-links a { text-decoration: none; color: var(--soldiergreen); margin-left: 1.5rem; }
         .nav-links a:hover, .nav-links a.active { color: var(--berrygood); font-weight: bold; }
         
         .form-container {
             max-width: 700px;
             margin: 10rem auto;
             padding: 3rem;
             background: white;
             border-radius: 10px;
             box-shadow: 0 5px 15px rgba(0,0,0,0.1);
         }
         .form-container h1 { 
             color: var(--soldiergreen); 
             text-align: center; 
             margin-bottom: 2rem;
         }
         .form-group { margin-bottom: 1.5rem; }
         label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: bold; }
         input, textarea { 
             width: 100%; 
             padding: 0.8rem; 
             border: 1px solid #ddd; 
             border-radius: 5px;
             font-size: 1rem;
         }
         textarea { height: 150px; resize: vertical; }
         .submit-btn { 
             background: var(--berrygood); 
             color: white; 
             padding: 1rem 2.5rem; 
             border: none; 
             border-radius: 30px;
             font-size: 1rem;
             font-weight: bold;
             cursor: pointer;
             width: 100%;
         }
         footer { background: var(--soldiergreen); color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
     </style>
 </head>
 <body>
     <nav>
         <div class="logo">COACH</div>
         <div class="nav-links">
             <a href="index.html">Home</a>
             <a href="Bags.html">Bags</a>
             <a href="Accessories.html">Accessories</a>
             <a href="Wear.html">Wear</a>
             <a href="About.html">About Us</a>
             <a href="Feedback.html" class="active">Feedback</a>
         </div>
     </nav>
     <div class="form-container">
         <h1>We Value Your Feedback</h1>
         <form>
             <div class="form-group">
                 <label for="name">Your Name</label>
                 <input type="text" id="name" placeholder="Enter your name">
             </div>
             <div class="form-group">
                 <label for="email">Your Email</label>
                 <input type="email" id="email" placeholder="Enter your email">
             </div>
             <div class="form-group">
                 <label for="message">Your Message</label>
                 <textarea id="message" placeholder="Write your feedback here..."></textarea>
             </div>
             <button type="submit" class="submit-btn">Send Message</button>
         </form>
     </div>
     <footer>
         <p>&copy; 2026 Coach. All rights reserved.</p>
     </footer>
 </body>
 </html>
